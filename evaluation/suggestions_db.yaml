    - "平衡工作和生活，保持可持续发展"
    - "保持好奇心和学习热情"

# =============================================================================
# 评分等级说明
# =============================================================================
score_guidelines:
  # 5 分 - 卓越
  excellent:
    description: "远超预期，展现专家级能力"
    characteristics:
      - "深度理解且能创新应用"
      - "能够指导他人"
      - "形成方法论体系"
      - "具备行业视野"

  # 4 分 - 优秀
  good:
    description: "符合高级职位要求"
    characteristics:
      - "扎实的专业知识"
      - "丰富的实践经验"
      - "清晰的逻辑思维"
      - "良好的沟通能力"

  # 3 分 - 良好
  satisfactory:
    description: "符合职位要求，有发展潜力"
    characteristics:
      - "掌握核心知识"
      - "有一定实践经验"
      - "基本逻辑清晰"
      - "能够有效沟通"

  # 2 分 - 一般
  needs_improvement:
    description: "基本符合要求，需要提升"
    characteristics:
      - "知识掌握不牢固"
      - "实践经验不足"
      - "逻辑不够清晰"
      - "沟通需要改进"

  # 1 分 - 不足
  poor:
    description: "与岗位要求有差距"
    characteristics:
      - "基础知识薄弱"
      - "缺乏实践经验"
      - "逻辑思维混乱"
      - "沟通表达困难"
