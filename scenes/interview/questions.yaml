# AgentScope AI Interview - Question Bank
# 面试问题库 v0.2
#
# 问题结构说明:
# - id: 唯一标识符
# - question: 问题内容
# - domain: 所属领域 (tech/frontend/backend/system_design/hr)
# - difficulty: 难度等级 (1-5)
# - type: 问题类型 (conceptual/experience/behavioral/technical/scenario)
# - category: 分类标签
# - sample_answer: 参考回答要点（可选）
# - evaluation_hints: 评估提示（可选）
# - follow_up_suggestions: 追问建议（可选）

questions:
  # ==================== HR 通用问题 ====================
  - id: hr_001
    question: 请用 2-3 分钟做一个自我介绍，重点介绍你的技术背景。
    domain: hr
    difficulty: 1
    type: behavioral
    category: self_introduction
    sample_answer: "应包含：教育背景、技术栈、核心项目经验、职业目标"
    evaluation_hints:
      - 表达是否清晰有条理
      - 是否突出技术亮点
      - 时间控制是否合理
    follow_up_suggestions:
      - "你提到的 XX 项目，能详细说说你的贡献吗？"
      - "为什么选择这个技术栈？"

  - id: hr_002
    question: 你为什么考虑离开现在的公司/寻找新机会？
    domain: hr
    difficulty: 2
    type: behavioral
    category: motivation
    sample_answer: "应聚焦职业发展，避免抱怨前公司，表达对新机会的期待"
    evaluation_hints:
      - 回答是否积极正面
      - 职业规划是否清晰
      - 是否体现上进心

  - id: hr_003
    question: 你未来 3-5 年的职业规划是什么？
    domain: hr
    difficulty: 2
    type: behavioral
    category: career_plan
    sample_answer: "应体现：技术深耕意愿、成长目标、与公司发展的契合"

  - id: hr_004
    question: 描述一次你和同事/上级发生技术分歧的经历，你是如何处理的？
    domain: hr
    difficulty: 3
    type: behavioral
    category: conflict_resolution
    sample_answer: "应体现：沟通能力、换位思考、以结果为导向"
    follow_up_suggestions:
      - "最后是如何达成一致的？"
      - "如果再来一次，你会怎么做？"

  - id: hr_005
    question: 你平时如何学习新技术？最近学习了什么？
    domain: hr
    difficulty: 2
    type: behavioral
    category: learning_ability
    sample_answer: "应包含：学习方法、学习渠道、具体学习成果"

  - id: hr_006
    question: 说一个你最有成就感的项目，为什么？
    domain: hr
    difficulty: 2
    type: experience
    category: achievement
    follow_up_suggestions:
      - "这个项目最大的挑战是什么？"
      - "你的具体贡献是什么？"

  - id: hr_007
    question: 你如何看待加班？能接受的工作强度是怎样的？
    domain: hr
    difficulty: 2
    type: behavioral
    category: work_attitude

  - id: hr_008
    question: 你有什么问题想问我们的吗？
    domain: hr
    difficulty: 1
    type: behavioral
    category: closing

  # ==================== 前端开发问题 ====================
  - id: fe_001
    question: HTML 语义化的意义是什么？举例说明常用的语义化标签。
    domain: frontend
    difficulty: 2
    type: conceptual
    category: html
    sample_answer: "语义化意义：SEO、可访问性、代码可读性。标签：header/nav/main/article/section/aside/footer 等"
    evaluation_hints:
      - 是否理解语义化对 SEO 的影响
      - 能否列举常用语义化标签
      - 是否了解无障碍访问

  - id: fe_002
    question: "请解释 CSS 盒模型，box-sizing: border-box 和 content-box 有什么区别？"
    domain: frontend
    difficulty: 2
    type: conceptual
    category: css
    sample_answer: "盒模型组成：content + padding + border + margin。border-box 的 width 包含 padding 和 border，content-box 不包含"

  - id: fe_003
    question: 什么是 BFC（块级格式化上下文）？如何触发 BFC？有什么应用场景？
    domain: frontend
    difficulty: 3
    type: conceptual
    category: css
    sample_answer: "BFC 是独立的渲染区域。触发方式：float、position:absolute/fixed、display:inline-block/table/flex/grid、overflow:hidden/scroll。应用：清除浮动、防止 margin 重叠"

  - id: fe_004
    question: JavaScript 中的闭包是什么？请举例说明它的应用场景。
    domain: frontend
    difficulty: 3
    type: conceptual
    category: javascript
    sample_answer: "闭包是函数及其词法环境的组合。应用：数据私有化、函数工厂、回调函数、防抖节流"
    follow_up_suggestions:
      - "闭包有什么潜在问题？"
      - "如何避免闭包导致的内存泄漏？"

  - id: fe_005
    question: 解释 JavaScript 中的事件循环（Event Loop）机制。
    domain: frontend
    difficulty: 3
    type: conceptual
    category: javascript
    sample_answer: "JS 是单线程的，事件循环负责协调调用栈、任务队列（宏任务/微任务）和 Web APIs"
    follow_up_suggestions:
      - "宏任务和微任务有什么区别？"
      - "setTimeout 和 Promise 的执行顺序？"

  - id: fe_006
    question: 什么是原型链？JavaScript 如何实现继承？
    domain: frontend
    difficulty: 3
    type: conceptual
    category: javascript

  - id: fe_007
    question: React 中的虚拟 DOM 是什么？它为什么能提高性能？
    domain: frontend
    difficulty: 3
    type: conceptual
    category: framework
    sample_answer: "虚拟 DOM 是真实 DOM 的轻量级 JS 对象表示。通过 diff 算法最小化 DOM 操作，批量更新提高性能"
    follow_up_suggestions:
      - "React 的 diff 算法有什么优化策略？"
      - "key 属性的作用是什么？"

  - id: fe_008
    question: React Hooks 解决了什么问题？使用 Hooks 有什么注意事项？
    domain: frontend
    difficulty: 3
    type: conceptual
    category: framework
    sample_answer: "解决：逻辑复用、组件复杂度。注意事项：只在顶层调用、依赖数组正确设置、自定义 Hook 命名"

  - id: fe_009
    question: Vue 的响应式原理是什么？Vue2 和 Vue3 有什么区别？
    domain: frontend
    difficulty: 4
    type: conceptual
    category: framework
    sample_answer: "Vue2 使用 Object.defineProperty，Vue3 使用 Proxy。Vue3 性能更好，支持更多数据类型"

  - id: fe_010
    question: 前端性能优化有哪些手段？请从多个维度说明。
    domain: frontend
    difficulty: 4
    type: technical
    category: performance
    sample_answer: "网络层面：CDN、HTTP2、懒加载。代码层面：代码分割、Tree Shaking。渲染层面：虚拟列表、防抖节流。缓存层面：浏览器缓存、Service Worker"
    follow_up_suggestions:
      - "如何衡量性能优化效果？"
      - "首屏加载时间如何优化？"

  - id: fe_011
    question: 什么是 XSS 攻击？前端如何防范？
    domain: frontend
    difficulty: 3
    type: conceptual
    category: security
    sample_answer: "XSS 是跨站脚本攻击。防范：输入过滤、输出编码、CSP 策略、HttpOnly Cookie、框架的自动转义"

  - id: fe_012
    question: 什么是 CSRF 攻击？如何防范？
    domain: frontend
    difficulty: 3
    type: conceptual
    category: security

  - id: fe_013
    question: 实现一个防抖（debounce）函数，并说明应用场景。
    domain: frontend
    difficulty: 3
    type: technical
    category: javascript
    sample_answer: "防抖：多次触发只执行最后一次。应用：搜索框输入、窗口 resize"

  - id: fe_014
    question: 实现一个节流（throttle）函数，并说明应用场景。
    domain: frontend
    difficulty: 3
    type: technical
    category: javascript
    sample_answer: "节流：固定时间内只执行一次。应用：滚动加载、按钮点击"

  - id: fe_015
    question: 前端如何实现跨域通信？有哪些方案？
    domain: frontend
    difficulty: 3
    type: technical
    category: network
    sample_answer: "方案：CORS、JSONP、代理服务器、postMessage、WebSocket"

  - id: fe_016
    question: HTTP 和 HTTPS 有什么区别？HTTPS 的握手过程是怎样的？
    domain: frontend
    difficulty: 4
    type: conceptual
    category: network

  - id: fe_017
    question: 从输入 URL 到页面展示，中间发生了什么？
    domain: frontend
    difficulty: 4
    type: conceptual
    category: network
    sample_answer: "DNS 解析→TCP 连接→HTTP 请求→服务器处理→HTTP 响应→浏览器渲染（HTML 解析、CSS 解析、布局、绘制、合成）"

  - id: fe_018
    question: 什么是 Webpack？它的工作原理是什么？
    domain: frontend
    difficulty: 3
    type: conceptual
    category: build_tool

  - id: fe_019
    question: 前端项目中如何做代码分割（Code Splitting）？
    domain: frontend
    difficulty: 3
    type: technical
    category: performance

  - id: fe_020
    question: 你如何管理前端项目的状态？Redux/Vuex/Zustand 各有什么特点？
    domain: frontend
    difficulty: 3
    type: experience
    category: state_management

  # ==================== 后端开发问题 ====================
  - id: be_001
    question: 什么是 RESTful API？设计 RESTful API 时需要注意什么？
    domain: backend
    difficulty: 2
    type: conceptual
    category: api
    sample_answer: "REST 是资源表述性状态转移。注意：资源命名用名词、HTTP 动词表达操作、状态码正确使用、版本控制、HATEOAS"
    follow_up_suggestions:
      - "REST 和 RPC 各有什么优缺点？"
      - "如何设计 API 版本控制？"

  - id: be_002
    question: HTTP 常见状态码有哪些？分别代表什么含义？
    domain: backend
    difficulty: 2
    type: conceptual
    category: http
    sample_answer: "1xx 信息、2xx 成功（200/201/204）、3xx 重定向（301/302/304）、4xx 客户端错误（400/401/403/404）、5xx 服务器错误（500/502/503）"

  - id: be_003
    question: 数据库索引的原理是什么？什么情况下索引会失效？
    domain: backend
    difficulty: 3
    type: conceptual
    category: database
    sample_answer: "索引原理：B+ 树等数据结构加速查询。失效情况：模糊查询%开头、函数操作、类型转换、OR 条件、复合索引不满足最左前缀"
    follow_up_suggestions:
      - "聚簇索引和非聚簇索引的区别？"
      - "如何优化慢查询？"

  - id: be_004
    question: 什么是事务？事务的 ACID 特性是什么？
    domain: backend
    difficulty: 3
    type: conceptual
    category: database
    sample_answer: "事务是数据库操作的逻辑单元。ACID：原子性、一致性、隔离性、持久性"

  - id: be_005
    question: 数据库的隔离级别有哪些？各有什么问题？
    domain: backend
    difficulty: 4
    type: conceptual
    category: database
    sample_answer: "读未提交（脏读）、读已提交（不可重复读）、可重复读（幻读）、串行化。MySQL 默认是可重复读"

  - id: be_006
    question: 什么是 SQL 注入？如何防范？
    domain: backend
    difficulty: 2
    type: conceptual
    category: security
    sample_answer: "SQL 注入是恶意 SQL 代码注入攻击。防范：参数化查询/预编译语句、输入验证、最小权限原则、ORM 框架"

  - id: be_007
    question: Redis 有哪些数据类型？分别适用于什么场景？
    domain: backend
    difficulty: 3
    type: conceptual
    category: cache
    sample_answer: "String（缓存/计数器）、Hash（对象存储）、List（队列）、Set（去重）、ZSet（排行榜）"
    follow_up_suggestions:
      - "Redis 持久化机制有哪些？"
      - "缓存穿透、击穿、雪崩如何解决？"

  - id: be_008
    question: 什么是缓存穿透、缓存击穿、缓存雪崩？如何解决？
    domain: backend
    difficulty: 4
    type: conceptual
    category: cache
    sample_answer: "穿透：查不存在的数据→布隆过滤器。击穿：热点 key 过期→互斥锁。雪崩：大量 key 同时过期→随机过期时间"

  - id: be_009
    question: 消息队列有什么作用？你用过哪些消息队列？
    domain: backend
    difficulty: 3
    type: experience
    category: mq
    sample_answer: "作用：解耦、异步、削峰。常见：Kafka（高吞吐）、RabbitMQ（功能丰富）、RocketMQ（事务消息）、Redis Stream"

  - id: be_010
    question: 如何保证消息队列的消息不丢失？
    domain: backend
    difficulty: 4
    type: technical
    category: mq
    sample_answer: "生产者：确认机制。Broker：持久化、副本。消费者：手动 ack、幂等处理"

  - id: be_011
    question: 什么是微服务架构？它有什么优缺点？
    domain: backend
    difficulty: 3
    type: conceptual
    category: architecture
    sample_answer: "微服务是将应用拆分为小型服务。优点：独立部署、技术多样、容错。缺点：复杂度高、分布式事务、运维成本"

  - id: be_012
    question: 微服务之间如何通信？各有什么特点？
    domain: backend
    difficulty: 3
    type: technical
    category: architecture
    sample_answer: "同步：HTTP/REST、gRPC。异步：消息队列。服务发现：Consul、Eureka、Nacos"

  - id: be_013
    question: 什么是分布式事务？有哪些解决方案？
    domain: backend
    difficulty: 4
    type: conceptual
    category: distributed
    sample_answer: "2PC/3PC、TCC、Saga、本地消息表、最大努力通知。CAP 理论和 BASE 理论"

  - id: be_014
    question: 如何设计一个分布式 ID 生成器？
    domain: backend
    difficulty: 4
    type: technical
    category: distributed
    sample_answer: "方案：UUID、数据库自增、Redis 自增、Snowflake 算法。Snowflake：时间戳 + 机器 ID+ 序列号"

  - id: be_015
    question: 什么是负载均衡？有哪些负载均衡算法？
    domain: backend
    difficulty: 3
    type: conceptual
    category: architecture
    sample_answer: "算法：轮询、加权轮询、最少连接、IP Hash、一致性 Hash"

  - id: be_016
    question: 如何优化数据库的慢查询？
    domain: backend
    difficulty: 3
    type: technical
    category: database
    sample_answer: "EXPLAIN 分析、添加索引、优化 SQL 语句、分库分表、读写分离、缓存热点数据"

  - id: be_017
    question: 什么是连接池？为什么需要连接池？
    domain: backend
    difficulty: 2
    type: conceptual
    category: database

  - id: be_018
    question: JWT 的原理是什么？有什么优缺点？
    domain: backend
    difficulty: 3
    type: conceptual
    category: security
    sample_answer: "JWT=Header.Payload.Signature。优点：无状态、跨域。缺点：无法主动失效、数据暴露（需加密）"

  - id: be_019
    question: 什么是 OAuth2.0？有哪些授权模式？
    domain: backend
    difficulty: 4
    type: conceptual
    category: security
    sample_answer: "授权码模式、隐式模式、密码模式、客户端模式"

  - id: be_020
    question: 如何设计一个高可用的系统？
    domain: backend
    difficulty: 4
    type: technical
    category: architecture
    sample_answer: "冗余部署、故障转移、限流降级、熔断、监控告警、灾备"

  # ==================== 系统设计问题 ====================
  - id: sd_001
    question: 如果要设计一个高并发的秒杀系统，你会考虑哪些方面？
    domain: system_design
    difficulty: 5
    type: scenario
    category: architecture
    sample_answer: "前端：按钮防重、静态资源 CDN。网关：限流、黑名单。服务：库存预热、Redis 扣减、MQ 异步。数据库：乐观锁、分库分表"
    follow_up_suggestions:
      - "如何防止超卖？"
      - "如何应对恶意刷单？"

  - id: sd_002
    question: 设计一个短链接生成系统，需要考虑什么？
    domain: system_design
    difficulty: 4
    type: scenario
    category: system
    sample_answer: "核心：发号器（自增/分布式 ID）、哈希算法、存储（KV/DB）。扩展：缓存、访问统计、防攻击"

  - id: sd_003
    question: 如何设计一个支持海量用户的 Feed 流系统？
    domain: system_design
    difficulty: 5
    type: scenario
    category: system
    sample_answer: "推拉结合模式。推模式：写扩散，适合粉丝少。拉模式：读扩散，适合粉丝多。混合模式：大 V 用拉，普通用户用推"

  - id: sd_004
    question: 设计一个分布式缓存系统，需要考虑哪些问题？
    domain: system_design
    difficulty: 5
    type: scenario
    category: cache
    sample_answer: "数据分片（一致性 Hash）、副本复制、故障转移、缓存穿透/击穿/雪崩、数据一致性"

  - id: sd_005
    question: 如何设计一个实时消息推送系统？
    domain: system_design
    difficulty: 4
    type: scenario
    category: system
    sample_answer: "长连接（WebSocket）、消息队列、离线消息存储、推送通道（APNs/FCM）、消息确认机制"

  - id: sd_006
    question: 设计一个 URL 访问统计系统，如何做到实时和高并发？
    domain: system_design
    difficulty: 4
    type: scenario
    category: data

  - id: sd_007
    question: 如何设计一个支持亿级数据的搜索系统？
    domain: system_design
    difficulty: 5
    type: scenario
    category: search
    sample_answer: "Elasticsearch 分片、倒排索引、查询优化、缓存、异步索引更新"

  - id: sd_008
    question: 什么是 CAP 理论？在实际系统中如何权衡？
    domain: system_design
    difficulty: 4
    type: conceptual
    category: theory
    sample_answer: "CAP：一致性、可用性、分区容错性，最多满足两个。实际：CP（ZooKeeper）、AP（Eureka）、最终一致性"

  - id: sd_009
    question: 什么是 BASE 理论？
    domain: system_design
    difficulty: 3
    type: conceptual
    category: theory
    sample_answer: "Basically Available（基本可用）、Soft state（软状态）、Eventually consistent（最终一致）"

  - id: sd_010
    question: 如何设计一个支持高并发的读接口？
    domain: system_design
    difficulty: 4
    type: scenario
    category: performance
    sample_answer: "多级缓存（本地 + 分布式）、CDN、读写分离、数据库优化、限流降级"

  - id: sd_011
    question: 如何设计一个文件上传和存储系统？
    domain: system_design
    difficulty: 4
    type: scenario
    category: storage
    sample_answer: "直传对象存储（OSS/S3）、分片上传、CDN 加速、图片处理、安全校验"

  - id: sd_012
    question: 如何保证分布式系统的数据一致性？
    domain: system_design
    difficulty: 5
    type: scenario
    category: distributed

  # ==================== 综合技术问题 ====================
  - id: tech_001
    question: 请介绍一下你最近做的项目，你在其中负责什么？
    domain: tech
    difficulty: 1
    type: experience
    category: project
    sample_answer: "应包含：项目背景、技术栈、个人职责、技术亮点、业务成果"
    follow_up_suggestions:
      - "这个项目最大的技术挑战是什么？"
      - "如果重新做，你会做什么改进？"

  - id: tech_002
    question: 你熟悉的技术栈有哪些？最擅长的是哪个？
    domain: tech
    difficulty: 1
    type: experience
    category: skills

  - id: tech_003
    question: 描述一个你解决过的最有挑战性的技术问题。
    domain: tech
    difficulty: 3
    type: experience
    category: problem_solving
    sample_answer: "应包含：问题背景、分析过程、解决方案、结果验证、经验总结"

  - id: tech_004
    question: 你如何进行代码审查？关注哪些方面？
