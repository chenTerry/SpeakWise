<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AgentScope AI Interview{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/main.css?v=0.4.1">

    {% block extra_css %}{% endblock %}
</head>
<body class="theme-dark">
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="/" class="brand-link">
                <span class="brand-icon">🤖</span>
                <span class="brand-text">AgentScope AI Interview</span>
            </a>
        </div>
        <div class="navbar-menu">
            <a href="/" class="nav-link">首页</a>
            <a href="/scenes" class="nav-link">场景选择</a>
            <a href="#" class="nav-link" id="theme-toggle">🌓</a>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <p>AgentScope AI Interview v{{ version | default('0.4.0') }}</p>
            <p>AI 模拟面试平台</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/static/js/app.js?v=0.4.1"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
